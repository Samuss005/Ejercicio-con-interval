<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5</title>
</head>
<body>

  <h1 id="display">0</h1>

  <button id="jugar">Jugar</button>
  <button id="parar">¡Para!</button>
  <button id="reiniciar">Jugar de nuevo</button>

  <p id="resultado"></p>

  <script>
    let numeroActual = 1
    let intervalo = null

    const display = document.getElementById("display")
    const resultado = document.getElementById("resultado")

    const btnJugar = document.getElementById("jugar")
    const btnParar = document.getElementById("parar")
    const btnReiniciar = document.getElementById("reiniciar")

    function jugar() {
      clearInterval(intervalo); // evita duplicados

      intervalo = setInterval(function() {
        numeroActual = Math.floor(Math.random() * 10) + 1
        display.innerHTML = numeroActual
      }, 200)
    }

    function parar() {
      clearInterval(intervalo);

      if (numeroActual === 7) {
        resultado.innerHTML = "¡Ganaste!"
      } else {
        resultado.innerHTML = "Era el " + numeroActual + ", inténtalo de nuevo."
      }
    }

    function reiniciar() {
      resultado.innerHTML = ""
      display.innerHTML = "0"
      numeroActual = 1
    }

    btnJugar.addEventListener("click", jugar)
    btnParar.addEventListener("click", parar)
    btnReiniciar.addEventListener("click", reiniciar)
  </script>

</body>
</html>
